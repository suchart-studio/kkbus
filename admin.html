<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - วาดเส้นทางรถสองแถว</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    
    <style>
        body { margin: 0; font-family: 'Sarabun', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #map { flex-grow: 1; }
        .admin-panel {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 2px solid #ddd;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        input, button { padding: 8px; font-size: 14px; }
        button { cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        #status { font-weight: bold; color: green; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <strong>จัดการเส้นทาง:</strong>
        <input type="text" id="routeName" placeholder="ชื่อสาย (เช่น สาย 8, สายสีฟ้า)">
        <button id="saveBtn">บันทึกเส้นทางที่วาด</button>
        <button id="clearBtn" style="background: #dc3545;">ล้างแผนที่</button>
        <span id="status"></span>
    </div>

    <div id="map"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <script>
        // 1. ตั้งค่า Firebase (ใช้ค่าเดียวกับหน้า User และ Driver)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "YOUR_PROJECT_ID",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. ตั้งค่าแผนที่
        const map = L.map('map').setView([16.4322, 102.8236], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. เตรียม Layer สำหรับวาด
        const drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        // 4. เพิ่มเครื่องมือวาด (Leaflet Draw)
        const drawControl = new L.Control.Draw({
            draw: {
                polyline: { shapeOptions: { color: '#ff3b30', weight: 5 } },
                polygon: false,
                circle: false,
                marker: false,
                circlemarker: false,
                rectangle: false
            },
            edit: {
                featureGroup: drawnItems
            }
        });
        map.addControl(drawControl);

        // 5. เมื่อวาดเส้นเสร็จ
        let currentRouteData = null;

        map.on(L.Draw.Event.CREATED, function (event) {
            const layer = event.layer;
            drawnItems.clearLayers(); // ให้วาดได้ทีละเส้นเดียวเพื่อความไม่งง
            drawnItems.addLayer(layer);
            
            // เก็บพิกัด LatLngs ทั้งหมดในรูปแบบ Array
            currentRouteData = layer.getLatLngs().map(latlng => ({
                lat: latlng.lat,
                lng: latlng.lng
            }));
            
            document.getElementById('status').innerText = "วาดเสร็จแล้ว กรุณาใส่ชื่อสายและกดบันทึก";
        });

        // 6. ฟังก์ชันบันทึกลง Firebase
        document.getElementById('saveBtn').addEventListener('click', () => {
            const routeName = document.getElementById('routeName').value;
            
            if (!routeName) {
                alert("กรุณาใส่ชื่อสายรถก่อนบันทึก!");
                return;
            }
            if (!currentRouteData) {
                alert("กรุณาวาดเส้นทางบนแผนที่ก่อน!");
                return;
            }

            // บันทึกลง node 'routes'
            db.ref('routes/' + routeName).set({
                name: routeName,
                coords: currentRouteData,
                updatedAt: Date.now()
            }).then(() => {
                document.getElementById('status').innerText = "บันทึก " + routeName + " สำเร็จ! ✅";
                document.getElementById('routeName').value = "";
                drawnItems.clearLayers();
                currentRouteData = null;
            }).catch(err => {
                alert("เกิดข้อผิดพลาด: " + err.message);
            });
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            drawnItems.clearLayers();
            currentRouteData = null;
            document.getElementById('status').innerText = "ล้างข้อมูลการวาดแล้ว";
        });

        // 7. (Optional) แสดงเส้นทางที่มีอยู่แล้วในระบบ
        db.ref('routes').on('value', (snapshot) => {
            const routes = snapshot.val();
            // คุณอาจจะเขียนฟังก์ชันแสดงเส้นที่มีอยู่แล้วเป็นสีจางๆ เพื่อไม่ให้วาดทับกัน
        });
    </script>
</body>
</html>
