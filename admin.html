<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - จัดการเส้นทางรถสองแถว</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        body { margin: 0; font-family: 'Sarabun', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 300px; background: #fff; border-right: 1px solid #ccc; display: flex; flex-direction: column; }
        #map { flex-grow: 1; }
        .panel-padding { padding: 15px; border-bottom: 1px solid #eee; }
        .route-item { padding: 10px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .route-item:hover { background: #f9f9f9; }
        .color-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        input, button { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        .btn-danger { background: #dc3545; margin-top: 2px; padding: 4px; font-size: 12px; }
        .btn-edit { background: #ffc107; color: #000; margin-top: 2px; padding: 4px; font-size: 12px; }
        #route-list { overflow-y: auto; flex-grow: 1; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="panel-padding">
            <strong>📍 จัดการเส้นทาง</strong>
            <input type="text" id="routeName" placeholder="ชื่อสาย (เช่น สาย 8)">
            <label style="font-size: 12px; margin-top: 10px; display: block;">เลือกสีเส้นทาง:</label>
            <input type="color" id="routeColor" value="#ff3b30">
            <button id="saveBtn" style="margin-top: 15px;">💾 บันทึกเส้นทาง</button>
            <p id="status" style="font-size: 12px; color: green; margin-top: 5px;"></p>
        </div>
        <div id="route-list">
            </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        // ใส่ Config ของคุณตรงนี้
        const firebaseConfig = {
            apiKey: "AIzaSyDMMwciq6QoLSaWK6xfdr0U3ynyahtoaSk",
            authDomain: "studio-a33fe.firebaseapp.com",
            databaseURL: "https://studio-a33fe-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "studio-a33fe",
            storageBucket: "studio-a33fe.firebasestorage.app",
            messagingSenderId: "753539109404",
            appId: "1:753539109404:web:2df0364770163d24e645d9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const map = L.map('map').setView([16.4322, 102.8236], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        const drawControl = new L.Control.Draw({
            draw: { polyline: true, polygon: false, circle: false, marker: false, circlemarker: false, rectangle: false },
            edit: { featureGroup: drawnItems }
        });
        map.addControl(drawControl);

        let currentCoords = null;

        // เมื่อวาดเสร็จ
        map.on(L.Draw.Event.CREATED, (e) => {
            drawnItems.clearLayers();
            const layer = e.layer;
            drawnItems.addLayer(layer);
            currentCoords = layer.getLatLngs().map(latlng => ({ lat: latlng.lat, lng: latlng.lng }));
        });

        // บันทึกข้อมูล
        document.getElementById('saveBtn').addEventListener('click', () => {
            const name = document.getElementById('routeName').value;
            const color = document.getElementById('routeColor').value;
            if (!name || !currentCoords) return alert("กรุณาวาดเส้นและตั้งชื่อสาย!");

            set(ref(db, 'routes/' + name), {
                name: name,
                color: color,
                coords: currentCoords,
                updatedAt: Date.now()
            }).then(() => {
                document.getElementById('status').innerText = "บันทึกสำเร็จ!";
                document.getElementById('routeName').value = "";
                drawnItems.clearLayers();
                currentCoords = null;
            });
        });

        // ดึงรายการเส้นทางมาแสดง (สำหรับแก้ไข/ลบ)
        onValue(ref(db, 'routes'), (snapshot) => {
            const listDiv = document.getElementById('route-list');
            listDiv.innerHTML = '<div class='panel-padding'><strong>รายการเส้นทางเดิม:</strong></div>';
            const data = snapshot.val();
            
            for (let id in data) {
                const route = data[id];
                const item = document.createElement('div');
                item.className = 'route-item';
                item.innerHTML = `
                    <div>
                        <span class="color-dot" style="background:${route.color}"></span>
                        <span>${route.name}</span>
                    </div>
                    <div>
                        <button class="btn-edit" onclick="window.editRoute('${id}')">แก้</button>
                        <button class="btn-danger" onclick="window.deleteRoute('${id}')">ลบ</button>
                    </div>
                `;
                listDiv.appendChild(item);
            }

            // ฟังก์ชันลบ
            window.deleteRoute = (id) => {
                if(confirm('ยืนยันการลบเส้นทาง?')) remove(ref(db, 'routes/' + id));
            };

            // ฟังก์ชันแก้ไข (ดึงข้อมูลเก่ากลับมาวาด)
            window.editRoute = (id) => {
                const route = data[id];
                document.getElementById('routeName').value = route.name;
                document.getElementById('routeColor').value = route.color;
                
                drawnItems.clearLayers();
                const latlngs = route.coords.map(c => [c.lat, c.lng]);
                const polyline = L.polyline(latlngs, { color: route.color });
                drawnItems.addLayer(polyline);
                currentCoords = route.coords;
                map.fitBounds(polyline.getBounds());
            };
        });
    </script>
</body>
</html>
