<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver GPS - Songthaew KKC</title>
</head>
<body style="text-align: center; padding: 50px; font-family: sans-serif;">
    <h2>ระบบส่งพิกัดรถสองแถว</h2>
    <p>รหัสรถ (สาย): <input type="text" id="driverId" placeholder="เช่น line8-01"></p>
    <button id="startBtn" style="padding: 15px 30px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 8px; cursor:pointer;">เริ่มแชร์ตำแหน่ง</button>
    <p id="status">สถานะ: รอการเชื่อมต่อ...</p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        // ใช้ฟังก์ชัน set และ ref เพื่อบันทึกข้อมูล
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMMwciq6QoLSaWK6xfdr0U3ynyahtoaSk",
            authDomain: "studio-a33fe.firebaseapp.com",
            databaseURL: "https://studio-a33fe-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "studio-a33fe",
            storageBucket: "studio-a33fe.firebasestorage.app",
            messagingSenderId: "753539109404",
            appId: "1:753539109404:web:2df0364770163d24e645d9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let watchId;

        document.getElementById('startBtn').addEventListener('click', () => {
            const driverId = document.getElementById('driverId').value;
            if(!driverId) return alert('กรุณากรอกรหัสรถ!');

            if (navigator.geolocation) {
                document.getElementById('status').innerText = "สถานะ: กำลังแชร์พิกัด 🟢";
                
                watchId = navigator.geolocation.watchPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        
                        // รูปแบบการบันทึกข้อมูลของ v12
                        set(ref(db, 'locations/' + driverId), {
                            lat: lat,
                            lng: lng,
                            timestamp: Date.now()
                        });
                    },
                    (error) => {
                        document.getElementById('status').innerText = "ข้อผิดพลาด: โปรดเปิด GPS";
                    },
                    { enableHighAccuracy: true, maximumAge: 0 }
                );
            } else {
                alert("เบราว์เซอร์ของคุณไม่รองรับ GPS");
            }
        });
    </script>
</body>
</html>
