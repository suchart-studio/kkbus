<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver - ระบบส่งพิกัดรถสองแถว</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; margin: 0; padding: 0; background-color: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
        .header { background-color: #333; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        .container { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 20px; gap: 20px; }
        label { font-size: 20px; font-weight: 600; color: #444; margin-bottom: -10px; display: block; }
        input { width: 100%; padding: 20px; font-size: 22px; border: 2px solid #ccc; border-radius: 12px; box-sizing: border-box; text-align: center; font-family: 'Sarabun', sans-serif; }
        input:focus { border-color: #007bff; outline: none; }
        button { width: 100%; padding: 25px; font-size: 28px; background: #28a745; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; box-shadow: 0 8px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        button:active { transform: scale(0.98); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        button.active-mode { background: #dc3545; animation: pulse-bg 2s infinite; }
        @keyframes pulse-bg { 0% { background: #dc3545; } 50% { background: #ff4757; } 100% { background: #dc3545; } }
        .status-box { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        #statusText { font-size: 22px; font-weight: bold; color: #666; margin: 0; }
        .footer-note { text-align: center; font-size: 16px; color: #888; padding: 10px; }
    </style>
</head>
<body>

    <div class="header">🚚 แอปคนขับรถสองแถว</div>

    <div class="container">
        <div class="status-box">
            <label>ชื่อสายรถ (เช่น สาย 8):</label><br><br>
            <input type="text" id="routeName" placeholder="กรอกชื่อสายรถ">
            <br><br><br>
            <label>เลขข้างรถ (เช่น 08-123):</label><br><br>
            <input type="text" id="carNumber" placeholder="กรอกเลขข้างรถ">
        </div>

        <button id="startBtn">▶️ เริ่มแชร์พิกัด</button>

        <div class="status-box">
            <p id="statusText">สถานะ: 🔴 ปิดการทำงาน</p>
        </div>
    </div>

    <div class="footer-note">* ระบบจะป้องกันไม่ให้หน้าจอดับขณะแชร์พิกัด</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        // เพิ่มฟังก์ชัน remove และ onDisconnect มาใช้งาน
        import { getDatabase, ref, set, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMMwciq6QoLSaWK6xfdr0U3ynyahtoaSk",
            authDomain: "studio-a33fe.firebaseapp.com",
            databaseURL: "https://studio-a33fe-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "studio-a33fe",
            storageBucket: "studio-a33fe.firebasestorage.app",
            messagingSenderId: "753539109404",
            appId: "1:753539109404:web:2df0364770163d24e645d9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let dId = localStorage.getItem('driverDeviceId');
        if (!dId) {
            dId = 'car-' + Math.floor(Math.random() * 100000);
            localStorage.setItem('driverDeviceId', dId);
        }

        if(localStorage.getItem('savedRouteName')) document.getElementById('routeName').value = localStorage.getItem('savedRouteName');
        if(localStorage.getItem('savedCarNumber')) document.getElementById('carNumber').value = localStorage.getItem('savedCarNumber');

        let isTracking = false;
        let watchId = null;
        let wakeLock = null;
        const driverRef = ref(db, 'locations/' + dId);

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) { console.error('Wake Lock error:', err); }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && isTracking) requestWakeLock();
        });

        const startBtn = document.getElementById('startBtn');
        const statusText = document.getElementById('statusText');
        const routeInput = document.getElementById('routeName');
        const carInput = document.getElementById('carNumber');

        startBtn.addEventListener('click', async () => {
            if (!isTracking) {
                const rName = routeInput.value.trim();
                const cNum = carInput.value.trim();
                
                if(!rName || !cNum) return alert('กรุณากรอกข้อมูลรถให้ครบถ้วน!');

                localStorage.setItem('savedRouteName', rName);
                localStorage.setItem('savedCarNumber', cNum);

                if (navigator.geolocation) {
                    isTracking = true;
                    startBtn.innerHTML = "⏹️ หยุดแชร์พิกัด";
                    startBtn.classList.add('active-mode');
                    routeInput.disabled = true; carInput.disabled = true;
                    statusText.innerHTML = "สถานะ: 🟢 กำลังส่งพิกัด";
                    statusText.style.color = "#28a745";

                    await requestWakeLock();

                    // ตั้งค่าให้ลบพิกัดทิ้งเมื่อปิดหน้าจอ/หลุดเชื่อมต่อ (ทำงานโดย Server Firebase อัตโนมัติ)
                    onDisconnect(driverRef).remove();

                    watchId = navigator.geolocation.watchPosition((pos) => {
                        set(driverRef, {
                            routeName: rName,
                            carNumber: cNum,
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            timestamp: Date.now()
                        });
                    }, (err) => {
                        alert("กรุณาเปิด GPS!"); stopTracking();
                    }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
                }
            } else {
                stopTracking();
            }
        });

        function stopTracking() {
            isTracking = false;
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            if (wakeLock !== null) { wakeLock.release().then(() => { wakeLock = null; }); }
            
            startBtn.innerHTML = "▶️ เริ่มแชร์พิกัด";
            startBtn.classList.remove('active-mode');
            routeInput.disabled = false; carInput.disabled = false;
            statusText.innerHTML = "สถานะ: 🔴 ปิดการทำงาน";
            statusText.style.color = "#666";

            // สั่งยกเลิก onDisconnect และลบพิกัดออกทันทีเมื่อกดปุ่มปิดการทำงาน
            onDisconnect(driverRef).cancel();
            remove(driverRef);
        }
    </script>
</body>
</html>
