<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver - โหมดประหยัดพลังงาน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; margin: 0; padding: 0; background-color: #000000; color: #ffffff; display: flex; flex-direction: column; height: 100vh; }
        .header { background-color: #111; color: #aaa; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; border-bottom: 1px solid #333; }
        .container { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 20px; gap: 20px; }
        
        .status-box { background: #111; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        label { font-size: 18px; font-weight: 600; color: #ccc; display: block; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; font-size: 20px; background: #222; color: white; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; text-align: center; font-family: 'Sarabun', sans-serif; }
        input:focus { border-color: #28a745; outline: none; }
        
        button { width: 100%; padding: 20px; font-size: 24px; background: #1b5e20; color: #ddd; border: 1px solid #2e7d32; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        button.active-mode { background: #b71c1c; border-color: #d32f2f; color: #fff; }
        
        #statusText { font-size: 20px; font-weight: bold; color: #888; margin: 0; }
        #statsText { font-size: 14px; color: #666; margin-top: 10px; font-weight: normal; }
        
        .footer-note { text-align: center; font-size: 14px; color: #555; padding: 10px; }
    </style>
</head>
<body>

    <div class="header">🔋 โหมดประหยัดพลังงาน & ดาต้า</div>

    <div class="container">
        <div class="status-box">
            <label>ชื่อสายรถ (เช่น สาย 8):</label>
            <input type="text" id="routeName" placeholder="กรอกชื่อสายรถ">
            <br><br>
            <label>เลขข้างรถ (เช่น 08-123):</label>
            <input type="text" id="carNumber" placeholder="กรอกเลขข้างรถ">
        </div>

        <button id="startBtn">▶️ เริ่มแชร์พิกัด</button>

        <div class="status-box">
            <p id="statusText">สถานะ: 🔴 ปิดการทำงาน</p>
            <p id="statsText">ส่งข้อมูลล่าสุด: ยังไม่มี</p>
        </div>
    </div>

    <div class="footer-note">* หน้าจอจะสว่างค้างไว้ แต่เป็นโทนสีดำเพื่อประหยัดแบต</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, set, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMMwciq6QoLSaWK6xfdr0U3ynyahtoaSk",
            authDomain: "studio-a33fe.firebaseapp.com",
            databaseURL: "https://studio-a33fe-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "studio-a33fe",
            storageBucket: "studio-a33fe.firebasestorage.app",
            messagingSenderId: "753539109404",
            appId: "1:753539109404:web:2df0364770163d24e645d9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let dId = localStorage.getItem('driverDeviceId');
        if (!dId) {
            dId = 'car-' + Math.floor(Math.random() * 100000);
            localStorage.setItem('driverDeviceId', dId);
        }

        if(localStorage.getItem('savedRouteName')) document.getElementById('routeName').value = localStorage.getItem('savedRouteName');
        if(localStorage.getItem('savedCarNumber')) document.getElementById('carNumber').value = localStorage.getItem('savedCarNumber');

        let isTracking = false;
        let watchId = null;
        let wakeLock = null;
        let heartbeatTimer = null; // ตัวแปรสำหรับระบบชีพจร
        const driverRef = ref(db, 'locations/' + dId);

        let lastUpdateTime = 0;
        let lastLat = null;
        let lastLng = null;
        let updatesCount = 0;

        function getDistanceInMeters(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) { console.error('Wake Lock error:', err); }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && isTracking) requestWakeLock();
        });

        const startBtn = document.getElementById('startBtn');
        const statusText = document.getElementById('statusText');
        const statsText = document.getElementById('statsText');
        const routeInput = document.getElementById('routeName');
        const carInput = document.getElementById('carNumber');

        startBtn.addEventListener('click', async () => {
            if (!isTracking) {
                const rName = routeInput.value.trim();
                const cNum = carInput.value.trim();
                if(!rName || !cNum) return alert('กรุณากรอกข้อมูลรถให้ครบถ้วน!');

                localStorage.setItem('savedRouteName', rName);
                localStorage.setItem('savedCarNumber', cNum);

                if (navigator.geolocation) {
                    isTracking = true;
                    startBtn.innerHTML = "⏹️ หยุดแชร์พิกัด";
                    startBtn.classList.add('active-mode');
                    routeInput.disabled = true; carInput.disabled = true;
                    statusText.innerHTML = "สถานะ: 🟢 กำลังส่งพิกัด";
                    statusText.style.color = "#4caf50";
                    statsText.innerHTML = "รอพิกัดแรก...";

                    await requestWakeLock();
                    onDisconnect(driverRef).remove();

                    // 🌟 ระบบ Heartbeat: ยืนยันตำแหน่งเดิมทุกๆ 30 วินาที ป้องกันรถหายจากแผนที่เมื่อเน็ตกระตุก
                    heartbeatTimer = setInterval(() => {
                        if (isTracking && lastLat !== null && lastLng !== null) {
                            set(driverRef, {
                                routeName: rName,
                                carNumber: cNum,
                                lat: lastLat,
                                lng: lastLng,
                                timestamp: Date.now()
                            }).then(() => {
                                const timeString = new Date().toLocaleTimeString('th-TH');
                                statsText.innerHTML = `ยืนยันพิกัดล่าสุด: ${timeString} <br>(ส่งไปแล้ว ${updatesCount} ครั้ง)`;
                            });
                        }
                    }, 30000); // ทำงานทุก 30 วินาที

                    // ระบบ GPS หลัก (ยังคงทำงานแบบประหยัดพลังงาน)
                    watchId = navigator.geolocation.watchPosition((pos) => {
                        const now = Date.now();
                        const currentLat = pos.coords.latitude;
                        const currentLng = pos.coords.longitude;

                        if (now - lastUpdateTime < 5000) return;

                        if (lastLat !== null && lastLng !== null) {
                            const distanceMoved = getDistanceInMeters(lastLat, lastLng, currentLat, currentLng);
                            if (distanceMoved < 5) return; 
                        }

                        set(driverRef, {
                            routeName: rName,
                            carNumber: cNum,
                            lat: currentLat,
                            lng: currentLng,
                            timestamp: now
                        }).then(() => {
                            lastUpdateTime = now;
                            lastLat = currentLat;
                            lastLng = currentLng;
                            updatesCount++;
                            const timeString = new Date().toLocaleTimeString('th-TH');
                            statsText.innerHTML = `ตรวจจับการเคลื่อนที่: ${timeString} <br>(ส่งไปแล้ว ${updatesCount} ครั้ง)`;
                        });

                    }, (err) => {
                        alert("กรุณาเปิด GPS และอนุญาตตำแหน่ง!"); stopTracking();
                    }, { 
                        enableHighAccuracy: true, 
                        maximumAge: 5000, 
                        timeout: 10000 
                    });
                }
            } else {
                stopTracking();
            }
        });

        function stopTracking() {
            isTracking = false;
            lastLat = null; lastLng = null; lastUpdateTime = 0; updatesCount = 0;
            
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            if (wakeLock !== null) { wakeLock.release().then(() => { wakeLock = null; }); }
            
            // 🌟 ปิดระบบ Heartbeat
            if (heartbeatTimer !== null) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
            
            startBtn.innerHTML = "▶️ เริ่มแชร์พิกัด";
            startBtn.classList.remove('active-mode');
            routeInput.disabled = false; carInput.disabled = false;
            statusText.innerHTML = "สถานะ: 🔴 ปิดการทำงาน";
            statusText.style.color = "#888";
            statsText.innerHTML = "ส่งข้อมูลล่าสุด: ยกเลิกการแชร์";

            onDisconnect(driverRef).cancel();
            remove(driverRef);
        }
    </script>
</body>
</html>
