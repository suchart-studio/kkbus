<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver GPS - Songthaew KKC</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; text-align: center; padding: 30px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 80%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 85%; padding: 15px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        #status { margin-top: 20px; font-weight: bold; color: #555; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚚 ส่งพิกัดรถสองแถว</h2>
        <input type="text" id="routeName" placeholder="ชื่อสาย (เช่น สาย 8)">
        <input type="text" id="carNumber" placeholder="เลขข้างรถ (เช่น 08-123)">
        <input type="hidden" id="driverId"> <button id="startBtn">เริ่มแชร์พิกัด</button>
        <p id="status">สถานะ: ปิดอยู่ 🔴</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMMwciq6QoLSaWK6xfdr0U3ynyahtoaSk",
            authDomain: "studio-a33fe.firebaseapp.com",
            databaseURL: "https://studio-a33fe-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "studio-a33fe",
            storageBucket: "studio-a33fe.firebasestorage.app",
            messagingSenderId: "753539109404",
            appId: "1:753539109404:web:2df0364770163d24e645d9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // สร้าง Driver ID แบบสุ่มครั้งเดียว
        let dId = localStorage.getItem('dId') || 'car-' + Math.floor(Math.random() * 10000);
        localStorage.setItem('dId', dId);

        document.getElementById('startBtn').addEventListener('click', function() {
            const rName = document.getElementById('routeName').value;
            const cNum = document.getElementById('carNumber').value;
            
            if(!rName || !cNum) return alert('กรุณากรอกชื่อสายและเลขรถ!');

            this.disabled = true;
            this.innerText = "กำลังทำงาน...";
            document.getElementById('status').innerText = "สถานะ: กำลังแชร์พิกัด 🟢";

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    set(ref(db, 'locations/' + dId), {
                        routeName: rName,
                        carNumber: cNum,
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        timestamp: Date.now()
                    });
                }, (err) => {
                    alert("กรุณาอนุญาตให้เข้าถึงตำแหน่ง GPS");
                }, { enableHighAccuracy: true });
            }
        });
    </script>
</body>
</html>
