<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ระบบติดตามรถสองแถว ขอนแก่น</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; }
        #map { width: 100vw; height: 100vh; }
        .info-panel { position: absolute; top: 15px; left: 50px; z-index: 1000; background: rgba(255, 255, 255, 0.95); padding: 12px 18px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border-left: 5px solid #ff3b30; color: #333; }
        .info-panel h3 { margin: 0 0 5px 0; font-size: 16px; font-weight: bold; }
        .info-panel p { margin: 0; font-size: 14px; color: #666; }
        .marker-label { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); background-color: rgba(30, 30, 30, 0.85); color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 12px; white-space: nowrap; font-weight: bold; pointer-events: none; border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .songthaew-marker { background-color: #ff3b30; border-radius: 50%; width: 18px; height: 18px; border: 2px solid white; box-shadow: 0 0 0 rgba(255, 59, 48, 0.7); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 59, 48, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip { background: #fff; color: #333; box-shadow: 0 3px 14px rgba(0,0,0,0.2); font-family: 'Sarabun', sans-serif; font-size: 14px; }
    </style>
</head>
<body>

    <div class="info-panel">
        <h3>📍 ติดตามรถสองแถวขอนแก่น</h3>
        <p>Real-time Tracking System</p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMMwciq6QoLSaWK6xfdr0U3ynyahtoaSk",
            authDomain: "studio-a33fe.firebaseapp.com",
            databaseURL: "https://studio-a33fe-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "studio-a33fe",
            storageBucket: "studio-a33fe.firebasestorage.app",
            messagingSenderId: "753539109404",
            appId: "1:753539109404:web:2df0364770163d24e645d9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const map = L.map('map').setView([16.4322, 102.8236], 14);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { 
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO', maxZoom: 19
        }).addTo(map);

        let routeLayers = L.layerGroup().addTo(map);
        onValue(ref(db, 'routes'), (snapshot) => {
            routeLayers.clearLayers();
            const routes = snapshot.val() || {};
            for (let id in routes) {
                const route = routes[id];
                if (route.coords) {
                    const path = route.coords.map(c => [c.lat, c.lng]);
                    L.polyline(path, { color: route.color || '#007bff', weight: 5, opacity: 0.8 })
                     .bindPopup(`<b>เส้นทาง: ${route.name}</b>`).addTo(routeLayers);
                }
            }
        });

        let markers = {}; 
        
        onValue(ref(db, 'locations'), (snapshot) => {
            // ถ้าตาราง locations ว่างเปล่า ให้ตั้งเป็น {} (ป้องกัน Error)
            const locations = snapshot.val() || {};
            
            // 1. ตรวจสอบและลบรถที่หายไปจากระบบ (คนขับเลิกแชร์/ปิดเว็บ)
            for (let driverId in markers) {
                if (!locations[driverId]) {
                    map.removeLayer(markers[driverId]); // ลบออกจากแผนที่
                    delete markers[driverId]; // ลบออกจากหน่วยความจำของหน้า User
                }
            }
            
            // 2. แสดงรถที่ยังคงเปิดแชร์พิกัดอยู่
            for (let driverId in locations) {
                const data = locations[driverId];
                const { lat, lng, timestamp, routeName, carNumber } = data;
                
                // ถ้ารถขาดการติดต่อนานเกิน 15 นาที ให้ซ่อนไปก่อน (เผื่อเน็ตคนขับค้างและไม่โดนตัดขาดทันที)
                const isOffline = (Date.now() - timestamp) > (15 * 60 * 1000);

                if (!isOffline) {
                    const labelText = `${routeName || 'ไม่ระบุสาย'} - ${carNumber || driverId}`;
                    const customIcon = L.divIcon({ 
                        className: 'custom-div-icon', 
                        html: `<div class="marker-label">${labelText}</div><div class="songthaew-marker"></div>`, 
                        iconSize: [20, 20], iconAnchor: [10, 10]
                    });

                    if (markers[driverId]) {
                        markers[driverId].setLatLng([lat, lng]);
                        markers[driverId].setIcon(customIcon);
                    } else {
                        markers[driverId] = L.marker([lat, lng], { icon: customIcon }).addTo(map);
                    }
                } else if (markers[driverId]) {
                    map.removeLayer(markers[driverId]);
                    delete markers[driverId];
                }
            }
        });
    </script>
</body>
</html>
